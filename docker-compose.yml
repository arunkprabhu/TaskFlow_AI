version: '3.8'

# Development docker-compose — hot-reload, source mounts, no auth required
# For production use:  docker compose -f docker-compose.prod.yml up -d

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production          # still uses the same Dockerfile
    container_name: meetingtotask-backend-dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app             # mount source for hot-reload
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - MONDAY_API_TOKEN=${MONDAY_API_TOKEN:-}
      - MONDAY_BOARD_ID=${MONDAY_BOARD_ID:-}
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
      - ENVIRONMENT=development
      - LOG_LEVEL=debug
    networks:
      - meetingtotask
    depends_on:
      - ollama
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder              # builder stage has dev server
    container_name: meetingtotask-frontend-dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    networks:
      - meetingtotask
    depends_on:
      - backend
    command: npm run dev -- --host

  ollama:
    image: ollama/ollama:latest
    container_name: meetingtotask-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - meetingtotask

networks:
  meetingtotask:
    driver: bridge

volumes:
  ollama_data:
